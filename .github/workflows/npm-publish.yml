name: npm-publish

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      # Required for npm trusted publishing (OIDC). No NPM_TOKEN is used, and
      # the provenance attestation is generated automatically.
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          registry-url: "https://registry.npmjs.org"

      # Trusted publishing needs npm >= 11.5.1, newer than what ships in the
      # Node image.
      - name: Use a recent npm
        run: npm install -g npm@latest

      # Refuse to publish when package.json, plugin.json, SKILL.md
      # metadata.version and the pushed tag disagree.
      - name: Versions are in sync
        run: node scripts/check-version.mjs

      - name: Smoke test
        run: sh tests/smoke.sh

      - name: Pack (list the tarball contents)
        run: npm pack --dry-run

      - name: Publish
        run: npm publish
